<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热处理考试刷题系统</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<style>
/* ===== Design Tokens ===== */
:root {
  --primary:#2563eb; --primary-hover:#1d4ed8; --primary-light:#eff3ff; --primary-100:#dbeafe;
  --success:#16a34a; --success-light:#f0fdf4; --success-100:#dcfce7;
  --warning:#d97706; --warning-light:#fffbeb; --warning-100:#fef3c7;
  --danger:#dc2626; --danger-light:#fef2f2; --danger-100:#fee2e2;
  --purple:#7c3aed; --purple-hover:#6d28d9;
  --bg:#f1f5f9; --surface:#ffffff; --surface-hover:#f8fafc;
  --text:#0f172a; --text-secondary:#475569; --text-muted:#94a3b8;
  --border:#e2e8f0; --border-light:#f1f5f9;
  --radius-sm:8px; --radius:12px; --radius-lg:16px; --radius-xl:20px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.06),0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:0 10px 25px rgba(0,0,0,0.08),0 4px 10px rgba(0,0,0,0.04);
  --sidebar-w:240px; --bottombar-h:64px;
}

/* ===== Dark Theme (system preference) ===== */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --primary:#3b82f6; --primary-hover:#60a5fa; --primary-light:#1e3a5f; --primary-100:#1e3a5f;
    --success:#22c55e; --success-light:#0f2d1f; --success-100:#0f2d1f;
    --warning:#f59e0b; --warning-light:#2d1f0f; --warning-100:#2d1f0f;
    --danger:#ef4444; --danger-light:#2d0f0f; --danger-100:#2d0f0f;
    --purple:#8b5cf6; --purple-hover:#a78bfa;
    --bg:#000; --surface:#0d0d0d; --surface-hover:#1a1a1a;
    --text:#f1f5f9; --text-secondary:#94a3b8; --text-muted:#64748b;
    --border:#262626; --border-light:#1a1a1a;
    --shadow-sm:0 1px 2px rgba(0,0,0,0.5);
    --shadow:0 1px 3px rgba(0,0,0,0.6),0 1px 2px rgba(0,0,0,0.4);
    --shadow-md:0 4px 12px rgba(0,0,0,0.7),0 2px 4px rgba(0,0,0,0.5);
    --shadow-lg:0 10px 25px rgba(0,0,0,0.8),0 4px 10px rgba(0,0,0,0.5);
  }
}

/* ===== Dark Theme (manual override) ===== */
:root[data-theme="dark"] {
  --primary:#3b82f6; --primary-hover:#60a5fa; --primary-light:#1e3a5f; --primary-100:#1e3a5f;
  --success:#22c55e; --success-light:#0f2d1f; --success-100:#0f2d1f;
  --warning:#f59e0b; --warning-light:#2d1f0f; --warning-100:#2d1f0f;
  --danger:#ef4444; --danger-light:#2d0f0f; --danger-100:#2d0f0f;
  --purple:#8b5cf6; --purple-hover:#a78bfa;
  --bg:#000; --surface:#0d0d0d; --surface-hover:#1a1a1a;
  --text:#f1f5f9; --text-secondary:#94a3b8; --text-muted:#64748b;
  --border:#262626; --border-light:#1a1a1a;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.5);
  --shadow:0 1px 3px rgba(0,0,0,0.6),0 1px 2px rgba(0,0,0,0.4);
  --shadow-md:0 4px 12px rgba(0,0,0,0.7),0 2px 4px rgba(0,0,0,0.5);
  --shadow-lg:0 10px 25px rgba(0,0,0,0.8),0 4px 10px rgba(0,0,0,0.5);
}

/* ===== Reset & Base ===== */
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-tap-highlight-color:transparent; }

/* ===== App Shell ===== */
.app-shell { display:flex; min-height:100vh; }

/* ===== Sidebar (Desktop) ===== */
.sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:50; overflow-y:auto; }
.sidebar-brand { padding:24px 20px 20px; cursor:pointer; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border-light); }
.sidebar-logo { width:40px; height:40px; background:linear-gradient(135deg,var(--primary),var(--purple)); border-radius:var(--radius); display:flex; align-items:center; justify-content:center; font-size:20px; }
.sidebar-title { font-size:17px; font-weight:700; color:var(--text); }
.sidebar-nav { flex:1; padding:12px 10px; display:flex; flex-direction:column; gap:2px; }
.sidebar-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:var(--radius-sm); border:none; background:transparent; cursor:pointer; font-size:14px; color:var(--text-secondary); transition:all .15s; text-align:left; width:100%; font-family:inherit; }
.sidebar-item:hover { background:var(--primary-light); color:var(--primary); }
.sidebar-item.active { background:var(--primary-light); color:var(--primary); font-weight:600; }
.sidebar-item .side-icon { font-size:18px; width:24px; text-align:center; flex-shrink:0; }
.sidebar-item .side-badge { margin-left:auto; background:var(--danger); color:#fff; font-size:11px; padding:2px 8px; border-radius:10px; min-width:20px; text-align:center; }
.sidebar-stats { padding:16px 20px; border-top:1px solid var(--border-light); font-size:12px; color:var(--text-muted); }

/* ===== Main Content ===== */
.main-content { flex:1; margin-left:var(--sidebar-w); padding:20px 24px 24px; }
.main-content .container { max-width:1100px; margin:0 auto; }

/* Quiz reading-width constraint */
.quiz-width-wrap { max-width:760px; }

/* ===== Bottom Bar (Mobile) ===== */
.bottombar { display:none; position:fixed; bottom:0; left:0; right:0; z-index:50; height:var(--bottombar-h); background:var(--surface); border-top:1px solid var(--border); padding:6px 8px env(safe-area-inset-bottom,8px); }
.bottombar-inner { display:flex; height:100%; max-width:500px; margin:0 auto; }
.bottombar-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; border:none; background:transparent; cursor:pointer; font-size:11px; color:var(--text-muted); transition:all .15s; border-radius:var(--radius-sm); padding:4px 0; font-family:inherit; }
.bottombar-item .bb-icon { font-size:22px; }
.bottombar-item.active { color:var(--primary); font-weight:600; }

/* ===== Cards ===== */
.card { background:var(--surface); border-radius:var(--radius-lg); padding:20px 24px; margin-bottom:16px; box-shadow:var(--shadow); border:1px solid var(--border); transition:box-shadow .2s,transform .2s; }
.card:hover { box-shadow:var(--shadow-md); }
.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.card-header h3 { font-size:17px; font-weight:600; }

/* ===== Header Cards ===== */
.hero-card { background:linear-gradient(135deg,var(--primary),#4f46e5); color:#fff; border-radius:var(--radius-lg); padding:28px 24px; margin-bottom:20px; box-shadow:var(--shadow-md); border:none; position:relative; overflow:hidden; }
.hero-card::after { content:''; position:absolute; top:-50%; right:-20%; width:200px; height:200px; background:rgba(255,255,255,0.06); border-radius:50%; pointer-events:none; }
.hero-card h1 { font-size:26px; margin-bottom:4px; position:relative; z-index:1; }
.hero-card p { opacity:0.85; font-size:14px; position:relative; z-index:1; }

/* ===== Buttons ===== */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 20px; border-radius:var(--radius-sm); border:none; cursor:pointer; font-size:14px; font-weight:500; transition:all .15s; text-decoration:none; white-space:nowrap; font-family:inherit; }
.btn:active { transform:scale(.97); }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-hover); box-shadow:var(--shadow-md); }
.btn-outline { background:var(--surface); color:var(--primary); border:1.5px solid var(--border); }
.btn-outline:hover { background:var(--primary-light); border-color:var(--primary); }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { opacity:.9; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { opacity:.9; }
.btn-ghost { background:transparent; color:var(--text-secondary); }
.btn-ghost:hover { background:var(--bg); color:var(--text); }
.btn-lg { padding:14px 28px; font-size:16px; border-radius:var(--radius); }
.btn-sm { padding:6px 14px; font-size:13px; border-radius:6px; }
.btn-block { display:flex; width:100%; }
.btn:disabled { opacity:.4; cursor:not-allowed; pointer-events:none; }

/* ===== Action Cards (2x2 grid) ===== */
.actions-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-bottom:20px; }
.action-card { background:var(--surface); border-radius:var(--radius); padding:22px 18px; border:1px solid var(--border); cursor:pointer; transition:all .2s; text-align:center; box-shadow:var(--shadow-sm); }
.action-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); border-color:var(--primary-100); }
.action-card .ac-icon { font-size:32px; margin-bottom:8px; }
.action-card .ac-title { font-size:15px; font-weight:600; color:var(--text); }
.action-card .ac-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }

/* ===== Filter Chips ===== */
.chip-group { display:flex; flex-wrap:wrap; gap:6px; }
.chip { padding:6px 14px; border-radius:20px; border:1.5px solid var(--border); background:var(--surface); cursor:pointer; font-size:13px; color:var(--text-secondary); transition:all .15s; font-family:inherit; }
.chip:hover { border-color:var(--primary); color:var(--primary); }
.chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }

/* ===== Quiz Area ===== */
.quiz-topbar { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.quiz-topbar .qt-info { font-size:13px; color:var(--text-muted); }
.quiz-topbar .qt-count { margin-left:auto; font-size:13px; color:var(--text-secondary); font-weight:500; }
.progress-bar { height:3px; background:var(--border); border-radius:2px; margin-bottom:20px; overflow:hidden; }
.progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--primary),#4f46e5); border-radius:2px; transition:width .3s; }

.question-card { background:var(--surface); border-radius:var(--radius-lg); padding:24px; box-shadow:var(--shadow); border:1px solid var(--border); margin-bottom:16px; }
.question-card.correct-glow { animation:cardGlowGreen .6s ease; }
.question-card.wrong-glow { animation:cardGlowRed .6s ease; }
.question-meta { display:flex; align-items:center; gap:8px; margin-bottom:16px; font-size:13px; color:var(--text-muted); }
.question-meta .q-type-badge { background:var(--primary-light); color:var(--primary); padding:3px 10px; border-radius:12px; font-weight:500; font-size:12px; }
.question-text { font-size:17px; line-height:1.8; margin-bottom:24px; padding:16px 20px; background:var(--bg); border-radius:var(--radius); border-left:4px solid var(--primary); }

/* Options */
.options { display:flex; flex-direction:column; gap:12px; margin-bottom:24px; }
.option { padding:16px 20px; border:2px solid var(--border); border-radius:var(--radius); cursor:pointer; transition:all .18s; font-size:16px; line-height:1.7; display:block; width:100%; background:var(--surface); position:relative; }
.option:hover { border-color:var(--primary); background:var(--primary-light); transform:translateX(3px); }
.option.selected { border-color:var(--primary); background:var(--primary-light); box-shadow:0 0 0 1px var(--primary); }
.option.correct { border-color:var(--success); background:var(--success-light); animation:correctPop .45s ease; }
.option.wrong { border-color:var(--danger); background:var(--danger-light); animation:shake .45s ease; }
.option .letter { width:36px; height:36px; border-radius:50%; background:var(--primary-light); color:var(--primary); display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; transition:all .3s; margin-right:12px; vertical-align:middle; }
.option.correct .letter { background:var(--success); color:#fff; animation:letterPop .3s ease .15s both; }
.option.wrong .letter { background:var(--danger); color:#fff; }

/* True/False */
.tf-buttons { display:flex; gap:12px; margin-bottom:24px; }
.tf-btn { flex:1; padding:28px; border:2px solid var(--border); border-radius:var(--radius); cursor:pointer; font-size:28px; text-align:center; transition:all .15s; background:var(--surface); font-weight:600; }
.tf-btn:hover { border-color:var(--primary); background:var(--primary-light); }
.tf-btn.correct { border-color:var(--success); background:var(--success-light); color:var(--success); }
.tf-btn.wrong { border-color:var(--danger); background:var(--danger-light); color:var(--danger); }

/* Fill input */
.fill-input { width:100%; padding:14px 18px; border:2px solid var(--border); border-radius:var(--radius); font-size:15px; margin-bottom:12px; transition:border-color .15s; font-family:inherit; background:var(--surface); }
.fill-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.fill-actions { display:flex; gap:8px; }

/* Feedback */
.answer-reveal { padding:16px 20px; background:var(--success-light); border-radius:var(--radius); margin:12px 0; font-size:14px; line-height:1.7; border:1px solid var(--success-100); }
.answer-reveal strong { color:var(--success); }
.feedback { padding:14px 18px; border-radius:var(--radius); margin:16px 0; font-size:15px; font-weight:600; }
.feedback.correct { background:var(--success-light); color:var(--success); border:1px solid var(--success-100); }
.feedback.wrong { background:var(--danger-light); color:var(--danger); border:1px solid var(--danger-100); }
.feedback.animate-in { animation:feedbackSlide .35s ease both; }
.self-check { display:flex; gap:10px; margin-top:12px; align-items:center; }
.nav-buttons { display:flex; gap:10px; justify-content:space-between; margin-top:20px; }

/* ===== Animations ===== */
@keyframes correctPop { 0%{transform:scale(1)} 30%{transform:scale(1.03)} 60%{transform:scale(.99)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(3px)} }
@keyframes letterPop { 0%{transform:scale(1)} 50%{transform:scale(1.35)} 100%{transform:scale(1)} }
@keyframes feedbackSlide { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
@keyframes cardGlowGreen { 0%{box-shadow:0 0 0 0 rgba(22,163,74,.4)} 50%{box-shadow:0 0 0 10px rgba(22,163,74,0)} 100%{box-shadow:0 0 0 0 rgba(22,163,74,0)} }
@keyframes cardGlowRed { 0%{box-shadow:0 0 0 0 rgba(220,38,38,.4)} 50%{box-shadow:0 0 0 10px rgba(220,38,38,0)} 100%{box-shadow:0 0 0 0 rgba(220,38,38,0)} }
@keyframes scoreCountUp { 0%{opacity:0;transform:translateY(20px) scale(.8)} 100%{opacity:1;transform:translateY(0) scale(1)} }
@keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }

/* ===== Exam Paper Mode ===== */
.exam-header { background:linear-gradient(135deg,#e65100,#bf360c); color:#fff; padding:20px 24px; border-radius:12px; margin-bottom:16px; text-align:center; }
.exam-header h1 { font-size:22px; margin-bottom:4px; }
.exam-header p { opacity:0.85; font-size:13px; }

.exam-config-card { background:var(--surface); border-radius:12px; padding:20px; margin-bottom:12px; box-shadow:var(--shadow-sm); border:1px solid var(--border); }
.exam-config-card h3 { margin-bottom:8px; }
.preset-btns { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.preset-btns .btn.active-preset { background:var(--primary); color:#fff; border-color:var(--primary); }
.custom-row { display:flex; gap:8px; align-items:center; margin-top:8px; }
.custom-row input { width:80px; padding:8px 12px; border:2px solid var(--border); border-radius:8px; font-size:15px; text-align:center; background:var(--surface); color:var(--text); }
.custom-row input:focus { outline:none; border-color:var(--primary); }

.exam-scorecard { background:var(--surface); border-radius:12px; padding:20px; margin-bottom:16px; text-align:center; box-shadow:var(--shadow-md); }
.exam-scorecard .big-num { font-size:56px; font-weight:800; }
.exam-scorecard .big-num.great { color:#0d904f; }
.exam-scorecard .big-num.good { color:var(--primary); }
.exam-scorecard .big-num.fair { color:#e65100; }
.exam-scorecard .big-num.poor { color:#d93025; }
.exam-scorecard .score-detail { font-size:14px; color:var(--text-secondary); margin-top:4px; }

.exam-progress-sticky { position:sticky; top:0; z-index:10; background:var(--bg); padding:8px 16px; border-radius:8px; margin-bottom:12px; display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text-secondary); border:1px solid var(--border); }
.exam-progress-sticky .mini-bar { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.exam-progress-sticky .mini-bar-fill { height:100%; background:var(--primary); border-radius:3px; transition:width .2s; }

.exam-qcard { background:var(--surface); border-radius:10px; padding:14px 16px; margin-bottom:8px; box-shadow:var(--shadow-sm); border-left:4px solid var(--border); transition:border-color .3s; }
.exam-qcard.submitted.correct { border-left-color:#0d904f; animation:correctPop .4s ease; }
.exam-qcard.submitted.wrong { border-left-color:#d93025; animation:shake .4s ease; }
.exam-qcard .eq-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.exam-qcard .eq-num { font-weight:700; font-size:14px; color:var(--primary); }
.exam-qcard .eq-type-badge { font-size:11px; color:var(--text-muted); background:var(--bg); padding:2px 8px; border-radius:10px; }
.exam-qcard .eq-result { font-size:12px; font-weight:600; display:none; }
.exam-qcard.submitted .eq-result { display:inline; }
.exam-qcard .eq-text { font-size:15px; line-height:1.65; margin-bottom:8px; }
.exam-qcard .eq-options { display:flex; flex-direction:column; gap:4px; }
.exam-qcard .eq-opt { padding:7px 10px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:14px; display:flex; align-items:center; gap:8px; transition:all .12s; }
.exam-qcard .eq-opt:hover { border-color:var(--primary); background:var(--primary-light); }
.exam-qcard .eq-opt.picked { border-color:var(--primary); background:var(--primary-light); }
.exam-qcard.submitted .eq-opt.correct-ans { border-color:#0d904f; background:var(--success-light); }
.exam-qcard.submitted .eq-opt.wrong-pick { border-color:#d93025; background:var(--danger-light); }
.exam-qcard .eq-letter { width:24px; height:24px; border-radius:50%; background:var(--primary-light); color:var(--primary); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:11px; flex-shrink:0; }
.exam-qcard.submitted .eq-opt.correct-ans .eq-letter { background:#0d904f; color:#fff; }
.exam-qcard.submitted .eq-opt.wrong-pick .eq-letter { background:#d93025; color:#fff; }
.exam-qcard .eq-tf { display:flex; gap:8px; }
.exam-qcard .eq-tf .eq-btn { flex:1; padding:8px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; text-align:center; font-size:16px; transition:all .12s; }
.exam-qcard .eq-tf .eq-btn:hover { border-color:var(--primary); }
.exam-qcard .eq-tf .eq-btn.picked { border-color:var(--primary); background:var(--primary-light); }
.exam-qcard.submitted .eq-tf .eq-btn.correct-ans { border-color:#0d904f; background:var(--success-light); }
.exam-qcard.submitted .eq-tf .eq-btn.wrong-pick { border-color:#d93025; background:var(--danger-light); }
.exam-qcard .eq-input { width:100%; padding:8px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; background:var(--surface); color:var(--text); }
.exam-qcard .eq-input:focus { outline:none; border-color:var(--primary); }
.exam-qcard .eq-answer-show { font-size:13px; color:var(--success); margin-top:6px; display:none; }
.exam-qcard.submitted .eq-answer-show { display:block; }
.exam-qcard .eq-self-btns { display:flex; gap:6px; margin-top:6px; }

.exam-sticky-bottom { position:sticky; bottom:16px; z-index:10; padding-top:8px; }
.exam-sticky-bottom .btn { box-shadow:var(--shadow-lg); width:100%; }

@media (max-width:767px) {
  .exam-scorecard .big-num { font-size:40px; }
  .exam-header { padding:14px 18px; }
  .exam-header h1 { font-size:18px; }
}

/* ===== Mistake List ===== */
.mistake-item { padding:14px 18px; border-bottom:1px solid var(--border-light); cursor:pointer; transition:background .15s; }
.mistake-item:hover { background:var(--surface-hover); }
.mistake-item:last-child { border-bottom:none; }
.mistake-item .q-type { font-size:11px; color:var(--primary); font-weight:600; background:var(--primary-light); padding:2px 8px; border-radius:10px; }

/* ===== Tab Bar ===== */
.tab-bar { display:flex; background:var(--surface); border-radius:var(--radius); margin-bottom:16px; overflow:hidden; box-shadow:var(--shadow-sm); border:1px solid var(--border); }
.tab-bar .tab-item { flex:1; text-align:center; padding:12px 8px; cursor:pointer; font-size:14px; font-weight:500; color:var(--text-secondary); transition:all .2s; border-bottom:3px solid transparent; border:none; background:transparent; font-family:inherit; }
.tab-bar .tab-item:hover { color:var(--primary); background:var(--primary-light); }

}

<script>
// ========== APP STATE ==========
const QUESTIONS = window.ALL_QUESTIONS || [];
const STORAGE_KEY = 'heat_treatment_quiz';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { mistakes: {}, history: [], stats: { total:0, correct:0 } };
  } catch(e) { return { mistakes: {}, history: [], stats: { total:0, correct:0 } }; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
let currentFilter = { topic: 'all', type: 'all' };
let currentQuestions = [];
let currentIndex = 0;
let answered = false;
let screen = 'home'; // home | quiz | mistakes | review | studyguide | smartreview | reader | exam
let examQuestions = [];
let examAnswers = {};
let examSubmitted = false;
let examTotalCount = 50;

// ========== NAVIGATION ==========
const NAV_MAP = {
  quiz: 'home', smartreview: 'home', exam: 'home',
  home: 'home', review: 'review', reader: 'reader',
  studyguide: 'studyguide', mistakes: 'mistakes'
};

function navigateTo(target) {
  if (target === 'mistakes') {
    screen = 'mistakes'; render(); updateNavActive('mistakes'); return;
  }
  // Reset state for screen changes
  if (target === 'home') { reviewActiveKP = null; readerActiveSection = null; }
  else if (target === 'review') { reviewActiveKP = null; }
  screen = target;
  render();
  updateNavActive(target);
}

function updateNavActive(target) {
  if (!target) target = screen;
  const navTarget = NAV_MAP[target] || target;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const sideItem = document.querySelector(`.sidebar-item[data-nav="${navTarget}"]`);
  if (sideItem) sideItem.classList.add('active');
  document.querySelectorAll('.bottombar-item').forEach(el => el.classList.remove('active'));
  const bbItem = document.querySelector(`.bottombar-item[data-nav="${navTarget}"]`);
  if (bbItem) bbItem.classList.add('active');
  updateMistakeBadge();
}

function updateMistakeBadge() {
  const badge = document.getElementById('mistakeBadge');
  if (!badge) return;
  const count = Object.keys(state.mistakes).length;
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

function toggleMoreMenu() {
  const menu = document.getElementById('moreMenu');
  const overlay = document.getElementById('moreOverlay');
  const isOpen = menu.classList.contains('show');
  if (isOpen) {
    menu.classList.remove('show');
    overlay.classList.remove('show');
  } else {
    menu.classList.add('show');
    overlay.classList.add('show');
  }
}

// ===== SM-2 Spaced Repetition State =====
// reviewSchedule: { questionId: { n, ef, interval, lastReview, nextReview } }
// n = repetition count, ef = ease factor (>=1.3), interval = days
function getSchedule() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY + '_sm2');
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}
function saveSchedule(sched) {
  localStorage.setItem(STORAGE_KEY + '_sm2', JSON.stringify(sched));
}

// SM-2 Algorithm: grade 0-5 (0=complete blackout, 5=perfect recall)
function sm2Grade(questionId, grade) {
  const sched = getSchedule();
  let card = sched[questionId] || { n: 0, ef: 2.5, interval: 0 };
  if (grade >= 3) {
    if (card.n === 0) card.interval = 1;
    else if (card.n === 1) card.interval = 6;
    else card.interval = Math.round(card.interval * card.ef);
    card.n++;
  } else {
    card.n = 0;
    card.interval = 1;
  }
  card.ef = Math.max(1.3, card.ef + (0.1 - (5-grade) * (0.08 + (5-grade) * 0.02)));
  const today = new Date().toISOString().split('T')[0];
  card.lastReview = today;
  card.nextReview = new Date(Date.now() + card.interval * 86400000).toISOString().split('T')[0];
  sched[questionId] = card;
  saveSchedule(sched);
  return card;
}

// Get cards due for review today
function getDueCards() {
  const sched = getSchedule();
  const today = new Date().toISOString().split('T')[0];
  const due = [];
  // Cards scheduled for review today or earlier
  for (const [qid, card] of Object.entries(sched)) {
    if (card.nextReview <= today) due.push(parseInt(qid));
  }
  // Cards that have been answered but never scheduled (from mistakes)
  const scheduledIds = new Set(Object.keys(sched).map(Number));
  const mistakeIds = Object.keys(state.mistakes).map(Number);
  for (const qid of mistakeIds) {
    if (!scheduledIds.has(qid)) due.push(qid);
  }
  return [...new Set(due)]; // dedup
}

// Get study streak (consecutive days with activity)
function getStreak() {
  const history = state.stats?.dailyActivity || {};
  const dates = Object.keys(history).sort().reverse();
  if (dates.length === 0) return 0;
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < dates.length; i++) {
    const expected = new Date(today);
    expected.setDate(expected.getDate() - i);
    const expectedStr = expected.toISOString().split('T')[0];
    if (dates.includes(expectedStr)) streak++;
    else break;
  }
  return streak;
}

// Record daily activity
function recordActivity() {
  if (!state.stats.dailyActivity) state.stats.dailyActivity = {};
  const today = new Date().toISOString().split('T')[0];
  state.stats.dailyActivity[today] = (state.stats.dailyActivity[today] || 0) + 1;
}

// ========== HELPERS ==========
function getTypeName(t) {
  const map = { choice:'选择题', truefalse:'判断题', fill:'填空题', shortanswer:'简答题', calculation:'计算题' };
  return map[t] || t;
}

function getTopicShort(t) {
  const map = { '热处理基础知识':'基础', '热处理设备与工艺':'设备工艺', '质量管理':'质量', '仪表知识':'仪表', '综合复习':'综合' };
  return map[t] || t;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
  return a;
}

function normalizeAnswer(s) {
  return (s||'').replace(/\s+/g,'').replace(/[，,、；;。．.]+/g,'').toLowerCase();
}

// ========== FILTER ==========
function getFilteredQuestions() {
  let qs = QUESTIONS;
  if (currentFilter.topic !== 'all') qs = qs.filter(q => q.topic === currentFilter.topic);
  if (currentFilter.type !== 'all') qs = qs.filter(q => q.type === currentFilter.type);
  return qs;
}

function renderReviewQuestion(q) {
  // Clean question text
  let dq = cleanQuestionText(q);

  let answerHtml = '';
  let optionsHtml = '';

  if (q.type === 'choice') {
    answerHtml = `<span class="rq-answer">${q.answer || '?'}</span>`;
    if (q.options && q.options.length > 0) {
      const correctLabels = q.answer ? q.answer.split('') : [];
      optionsHtml = `<div class="rq-options">${q.options.map((o, i) => {
        const label = q.option_labels && q.option_labels[i] ? q.option_labels[i] : String.fromCharCode(65+i);
        const isCorrect = correctLabels.includes(label);
        return `<div style="${isCorrect ? 'color:var(--success);font-weight:700;' : ''}display:block;margin-bottom:2px;">${label}. ${o}</div>`;
      }).join('')}</div>`;
    }
  } else if (q.type === 'truefalse') {
    const isCorrect = q.answer === '√';
    answerHtml = isCorrect ? '<span class="rq-answer">✓ 正确</span>' : '<span class="rq-answer wrong-ans">✗ 错误</span>';
  } else if (q.type === 'fill') {
    answerHtml = q.answer ? `<span class="rq-answer">${escapeHtml(q.answer)}</span>` : '<span class="rq-answer" style="background:var(--warning-light);color:var(--warning)">答案缺失</span>';
  }

  // Explanation (for shortanswer/calculation)
  let explanationHtml = '';
  if (q.explanation) {
    explanationHtml = `<div class="rq-explanation"><strong>📝 解析/答案：</strong><br>${q.explanation.replace(/\n/g, '<br>')}</div>`;
  }

  const typeBadge = getTypeName(q.type);

  return `
    <div class="review-qcard">
      <div class="rq-meta">[${typeBadge}] · ${q.topic || ''} ${answerHtml}</div>
      <div class="rq-text">${dq}</div>
      ${optionsHtml}
      ${explanationHtml}
    </div>
  `;
}

  const card = getSchedule()[q.id];
  const progress = Math.round(smartReviewIndex / smartReviewQuestions.length * 100);

// ========== READER MODE ==========
// Linear reading mode: browse all questions in chapter order, like a book
let readerActiveSection = null;
let readerShowAnswers = localStorage.getItem('readerShowAnswers') !== 'false'; // default true
let readerFontSize = localStorage.getItem('readerFontSize') || 'md';
let readerSearchTerm = '';
let readerSearchTimeout = null;
function getReaderViewedIds() {
  try { return new Set(JSON.parse(localStorage.getItem('readerViewedIds') || '[]')); }
  catch(e) { return new Set(); }
}
function saveReaderViewedIds(ids) {
  localStorage.setItem('readerViewedIds', JSON.stringify([...ids]));
}
function markReaderSectionViewed(section) {
  const viewed = getReaderViewedIds();
  const qs = QUESTIONS.filter(q => (q.topic || '') === section);
  let added = 0;
  qs.forEach(q => { if (!viewed.has(q.id)) { viewed.add(q.id); added++; } });
  if (added > 0) saveReaderViewedIds(viewed);
}
function getReaderViewedCount() { return getReaderViewedIds().size; }

const READER_SECTIONS = ['热处理基础知识', '热处理设备与工艺', '质量管理', '仪表知识', '综合复习'];
const READER_TITLES = {
  '热处理基础知识': '一、热处理基础知识',
  '热处理设备与工艺': '二、热处理设备与工艺',
  '质量管理': '三、质量管理',
  '仪表知识': '四、仪表知识',
  '综合复习': '五、综合复习',
};
const READER_TYPE_ORDER = ['choice', 'truefalse', 'fill', 'shortanswer', 'calculation'];
const READER_TYPE_NAMES = {
  'choice': '选择题', 'truefalse': '判断题', 'fill': '填空题',
  'shortanswer': '简答题', 'calculation': '计算题',
};

function renderReader() {
  // Restore saved section on first entry
  if (!readerActiveSection) {
    const saved = localStorage.getItem('readerLastSection');
    if (saved && READER_SECTIONS.includes(saved)) readerActiveSection = saved;
  }

  // Group questions by topic → type
  const groups = {};
  for (const sec of READER_SECTIONS) {
    groups[sec] = {};
    for (const t of READER_TYPE_ORDER) groups[sec][t] = [];
  }
  QUESTIONS.forEach(q => {
    const topic = q.topic || '';
    if (groups[topic] && groups[topic][q.type]) {
      groups[topic][q.type].push(q);
    }
  });

  // Build sidebar navigation
  const sidebarHtml = READER_SECTIONS.map(sec => {
    const total = Object.values(groups[sec]).reduce((s, qs) => s + qs.length, 0);
    const activeCls = (readerActiveSection === sec || (!readerActiveSection && sec === READER_SECTIONS[0])) ? ' active' : '';
    return `<button class="kp-nav-item${activeCls}" data-reader-sec="${sec}">
      ${READER_TITLES[sec]} <span class="kp-count">${total}</span>
    </button>`;
  }).join('');

  // Build main content - show all sections on one scrollable page
  const activeSection = readerActiveSection || READER_SECTIONS[0];
  let mainHtml = '';
  let globalNum = 0;
  for (const sec of READER_SECTIONS) {
    const isActive = sec === activeSection;
    mainHtml += `<div class="reader-section" id="reader-${sec}" style="${isActive ? '' : 'display:none'}">
      <div class="reader-sec-title">${READER_TITLES[sec]}</div>`;

    for (const t of READER_TYPE_ORDER) {
      const qs = groups[sec][t];
      if (qs.length === 0) continue;
      mainHtml += `<div class="reader-type-title">${READER_TYPE_NAMES[t]}（${qs.length}题）</div>`;
      for (const q of qs) {
        globalNum++;
        mainHtml += renderReaderQCard(q, globalNum);
      }
    }
    mainHtml += '</div>';
  }

  // Build dropdown for mobile quick jump
  const dropdownHtml = READER_SECTIONS.map(sec => {
    const total = Object.values(groups[sec]).reduce((s, qs) => s + qs.length, 0);
    const sel = (readerActiveSection === sec || (!readerActiveSection && sec === READER_SECTIONS[0])) ? ' selected' : '';
    return `<option value="${sec}"${sel}>${READER_TITLES[sec]} (${total}题)</option>`;
  }).join('');

  // Font size state
  const fsLabel = readerFontSize === 'sm' ? '小' : readerFontSize === 'lg' ? '大' : '中';
  const ansBtnText = readerShowAnswers ? '👁️ 隐藏答案' : '👁️ 显示答案';
  const viewedCount = getReaderViewedCount();
  const viewedPct = QUESTIONS.length > 0 ? Math.round(viewedCount / QUESTIONS.length * 100) : 0;
  const hideAnsCls = readerShowAnswers ? '' : ' hide-answers';
  const fsCls = readerFontSize === 'sm' ? ' reader-fs-sm' : readerFontSize === 'lg' ? ' reader-fs-lg' : '';

  return `
    <div class="review-topbar" style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <button class="btn btn-sm btn-outline" data-action="back">← 返回</button>
      <span style="font-size:14px;color:#666">📜 阅读模式 · 按章节顺序从头到尾浏览</span>
    </div>

    <div class="reader-toolbar">
      <div class="reader-toolbar-row" style="flex:1;min-width:0">
        <input type="text" class="reader-search" id="readerSearch" placeholder="搜索题目关键词..." value="${escapeHtml(readerSearchTerm)}" autocomplete="off">
        <span class="reader-search-count" id="readerSearchCount"></span>
      </div>
      <div class="reader-toolbar-row">
        <span style="font-size:12px;color:#999">字号</span>
        <button class="reader-fs-btn${readerFontSize==='sm'?' active':''}" data-fs="sm" title="小号">A⁻</button>
        <button class="reader-fs-btn${readerFontSize==='md'?' active':''}" data-fs="md" title="中号">A</button>
        <button class="reader-fs-btn${readerFontSize==='lg'?' active':''}" data-fs="lg" title="大号">A⁺</button>
      </div>
      <div class="reader-toolbar-row">
        <button class="btn btn-sm btn-outline reader-ans-btn" id="readerAnsToggle">${ansBtnText}</button>
        <span class="reader-stats">📊 ${viewedCount}/${QUESTIONS.length} (${viewedPct}%)</span>
      </div>
    </div>
    <div class="review-layout${hideAnsCls}${fsCls}" id="readerLayout">
      <div class="review-sidebar">
        <div class="kp-nav-label" style="display:none">📂 章节导航（左右滑动）</div>
        <div class="kp-dropdown-wrap" style="display:none">
          <select id="readerSelect" onchange="jumpToReaderSection(this.value)">${dropdownHtml}</select>
        </div>
        <div class="kp-nav">${sidebarHtml}</div>
      </div>
      <div class="review-main" id="readerMain">
        ${mainHtml}
      </div>
    </div>
    <button class="reader-back-top" id="readerBackTop" title="回到顶部" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆</button>
  `;
}

function renderReaderQCard(q, num) {
  let dq = cleanQuestionText(q);

  let answerHtml = '';
  let extraHtml = '';

  if (q.type === 'choice') {
    answerHtml = q.answer
      ? `<span class="rq-answer">${escapeHtml(q.answer)}</span>`
      : '<span class="rq-answer" style="background:var(--warning-light);color:var(--warning)">?</span>';
    if (q.options && q.options.length > 0) {
      const correctLabels = q.answer ? q.answer.split('') : [];
      const isMulti = correctLabels.length > 1;
      extraHtml = `<div class="rq-options">${q.options.map((o, i) => {
        const label = q.option_labels && q.option_labels[i] ? q.option_labels[i] : String.fromCharCode(65+i);
        const isCorrect = correctLabels.includes(label);
        return `<div class="reader-opt${isCorrect ? ' reader-opt-correct' : ''}">${label}. ${escapeHtml(o)}</div>`;
      }).join('')}</div>`;
    }
  } else if (q.type === 'truefalse') {
    answerHtml = q.answer === '√'
      ? '<span class="rq-answer">✓ 正确</span>'
      : '<span class="rq-answer wrong-ans">✗ 错误</span>';
  } else if (q.type === 'fill') {
    answerHtml = q.answer
      ? `<span class="rq-answer">${escapeHtml(q.answer)}</span>`
      : '<span class="rq-answer" style="background:var(--warning-light);color:var(--warning)">答案缺失</span>';
  } else {
    // shortanswer / calculation
    if (q.answer) {
      answerHtml = `<span class="rq-answer">${escapeHtml(q.answer)}</span>`;
    }
  }

  // Show per-question explanation for ALL types
  if (q.explanation && q.explanation.trim()) {
    extraHtml += `<div class="rq-explanation">💡 ${q.explanation.replace(/\n/g, '<br>')}</div>`;
  }

  // Knowledge point badge + inline explanation
  const kpName = q.knowledge_point || '';
  let kpBadgeHtml = '';
  if (kpName) {
    kpBadgeHtml = `<span class="rq-kp-badge" data-kp="${escapeHtml(kpName)}" onclick="event.stopPropagation();toggleReaderKP(this)">🔖 ${escapeHtml(kpName)}</span>
    <div class="rq-kp-info" id="kpinfo-${q.id}"></div>`;
  }

  const typeBadge = getTypeName(q.type);

  return `
    <div class="reader-qcard" id="rq-${q.id}">
      <div class="rq-meta">${num}. [${typeBadge}] ${answerHtml}${kpBadgeHtml}</div>
      <div class="rq-text">${escapeHtml(dq)}</div>
      ${extraHtml}
    </div>`;
}

function jumpToReaderSection(secName) {
  // Mark previous section as viewed before switching
  if (readerActiveSection) markReaderSectionViewed(readerActiveSection);
  readerActiveSection = secName;
  localStorage.setItem('readerLastSection', secName);
  const mainDiv = document.getElementById('readerMain');
  if (!mainDiv) { render(); return; }
  // Hide all sections, show selected
  mainDiv.querySelectorAll('.reader-section').forEach(el => {
    el.style.display = el.id === 'reader-' + secName ? '' : 'none';
  });
  // Update nav active state
  document.querySelectorAll('[data-reader-sec]').forEach(item => {
    item.classList.toggle('active', item.dataset.readerSec === secName);
  });
  // Update dropdown
  const dropdown = document.getElementById('readerSelect');
  if (dropdown) dropdown.value = secName;
  // Scroll to top of section
  const target = document.getElementById('reader-' + secName);
  if (target) target.scrollIntoView({ behavior: 'smooth' });
  // On mobile, scroll nav item into view
  if (window.innerWidth <= 767) {
    const navItem = document.querySelector(`[data-reader-sec="${secName}"]`);
    if (navItem) navItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
  // Update stats
  updateReaderStats();
  // Mark new section as viewed after a short delay (let DOM render)
  setTimeout(() => markReaderSectionViewed(secName), 500);
}

function toggleReaderKP(el) {
  const qid = el.closest('.reader-qcard').id.replace('rq-', '');
  const infoPanel = document.getElementById('kpinfo-' + qid);
  if (!infoPanel) return;
  const isOpen = infoPanel.classList.contains('show');
  // Close all other open panels
  document.querySelectorAll('.rq-kp-info.show').forEach(p => p.classList.remove('show'));
  document.querySelectorAll('.rq-kp-badge.open').forEach(b => b.classList.remove('open'));
  if (!isOpen) {
    const kpName = el.dataset.kp;
    // Look up KP info from global KNOWLEDGE_POINTS
    let kpInfo = null;
    for (const kp of KNOWLEDGE_POINTS) {
      if (kp.name === kpName) { kpInfo = kp; break; }
    }
    let html = `<div class="kp-label">📌 ${escapeHtml(kpName)}</div>`;
    if (kpInfo) {
      html += `<div>📖 ${escapeHtml(kpInfo.explanation)}</div>`;
      if (kpInfo.key_concepts && kpInfo.key_concepts.length > 0) {
        html += `<div style="margin-top:4px">🔑 核心概念：${kpInfo.key_concepts.map(escapeHtml).join('、')}</div>`;
      }
      if (kpInfo.exam_focus) {
        html += `<div class="kp-exam" style="margin-top:4px">⚠️ 考试重点：${escapeHtml(kpInfo.exam_focus)}</div>`;
      }
    }
    infoPanel.innerHTML = html;
    infoPanel.classList.add('show');
    el.classList.add('open');
  }
}

function updateReaderStats() {

  const pct = QUESTIONS.length > 0 ? Math.round(count / QUESTIONS.length * 100) : 0;
  statsEl.textContent = '📊 ' + count + '/' + QUESTIONS.length + ' (' + pct + '%)';
}

function applyReaderSearch(term) {
  readerSearchTerm = term;
  const countEl = document.getElementById('readerSearchCount');
  const sections = document.querySelectorAll('.reader-section');
  let totalVisible = 0;
  let totalCards = 0;

  if (!term.trim()) {
    // No search: restore normal display - show active section, hide others
    const activeSection = readerActiveSection || READER_SECTIONS[0];
    sections.forEach(sec => {
      const isActive = sec.id === 'reader-' + activeSection;
      sec.style.display = isActive ? '' : 'none';
      sec.querySelectorAll('.reader-type-title').forEach(t => t.style.display = '');
      sec.querySelectorAll('.reader-qcard').forEach(c => c.style.display = '');
    });
    if (countEl) countEl.classList.remove('show');
    return;
  }

  // Search mode: show all sections, hide non-matching cards and empty type titles
  const lower = term.toLowerCase();
  sections.forEach(sec => {
    sec.style.display = ''; // show all sections
    const typeTitles = sec.querySelectorAll('.reader-type-title');
    const cards = sec.querySelectorAll('.reader-qcard');
    totalCards += cards.length;
    // Filter cards
    cards.forEach(card => {
      const text = (card.querySelector('.rq-text')?.textContent || '') + ' ' + (card.querySelector('.rq-meta')?.textContent || '');
      const match = text.toLowerCase().includes(lower);
      card.style.display = match ? '' : 'none';
      if (match) totalVisible++;
    });
    // Hide type titles that have no visible cards after filtering
    typeTitles.forEach(title => {
      let next = title.nextElementSibling;
      let hasVisible = false;
      while (next && !next.classList.contains('reader-type-title') && !next.classList.contains('reader-sec-title')) {
        if (next.classList.contains('reader-qcard') && next.style.display !== 'none') {
          hasVisible = true;
          break;
        }
        next = next.nextElementSibling;
      }
      title.style.display = hasVisible ? '' : 'none';
    });
  });

  if (countEl) {
    countEl.textContent = '找到 ' + totalVisible + '/' + totalCards + ' 题';
    countEl.classList.add('show');
  }
}

function bindReaderSearch() {
  const input = document.getElementById('readerSearch');
  if (!input) return;
  input.addEventListener('input', function() {
    clearTimeout(readerSearchTimeout);
    readerSearchTimeout = setTimeout(() => applyReaderSearch(this.value), 250);
  });
  // Apply saved search term on load
  if (readerSearchTerm) {
    input.value = readerSearchTerm;
    setTimeout(() => applyReaderSearch(readerSearchTerm), 100);
  }
}

function bindReaderFontSize() {
  document.querySelectorAll('.reader-fs-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      readerFontSize = this.dataset.fs;
      localStorage.setItem('readerFontSize', readerFontSize);
      const layout = document.getElementById('readerLayout');
      if (layout) {

      }
      // Update active state
      document.querySelectorAll('.reader-fs-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    });
  });
}

function bindReaderAnswerToggle() {
  const btn = document.getElementById('readerAnsToggle');
  if (!btn) return;
  btn.addEventListener('click', function() {
    readerShowAnswers = !readerShowAnswers;

  });
}

// ========== EVENT BINDING ==========
function bindEvents() {
  // Persistent DOM elements — bind once (avoid duplicate listeners on re-render)
  if (!window._persistentBound) {
    window._persistentBound = true;

    // Sidebar navigation
    document.querySelectorAll('.sidebar-item').forEach(el => {
      el.addEventListener('click', function() {
        navigateTo(this.dataset.nav);
      });
    });

    // Bottom bar navigation
    document.querySelectorAll('.bottombar-item').forEach(el => {
      el.addEventListener('click', function() {
        if (this.dataset.nav === 'more') {
          toggleMoreMenu();
        } else {
          navigateTo(this.dataset.nav);
        }
      });
    });

    // More menu items
    document.querySelectorAll('.more-menu-item').forEach(el => {
      el.addEventListener('click', function() {
        toggleMoreMenu();
        navigateTo(this.dataset.nav);
      });
    });

    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
      themeToggle.addEventListener('click', cycleTheme);
    }
  }

  // Review KP nav
  document.querySelectorAll('[data-kp]').forEach(el => {
    el.addEventListener('click', function() {

                <div>${kpInfo.explanation}</div>

                ${kpInfo.exam_focus ? `<div class="kp-section-label">⚠️ 考试重点：${kpInfo.exam_focus}</div>` : ''}
              </div>
              ${activeQs.map(q => renderReviewQuestion(q)).join('')}
            </div>`;
          } else {
            html = `<div class="review-kp-section">
              <div class="review-kp-header"><h3>📌 ${kpName} (${activeQs.length}题)</h3></div>
              ${activeQs.map(q => renderReviewQuestion(q)).join('')}
            </div>`;
          }
          mainDiv.innerHTML = html;
          // Update active state
          document.querySelectorAll('.kp-nav-item').forEach(item => item.classList.remove('active'));
          const clicked = document.querySelector(`.kp-nav-item[data-kp="${kpName.replace(/"/g, '&quot;')}"]`);
          if (clicked) {
            clicked.classList.add('active');
            // Scroll active item into view on mobile
            if (window.innerWidth <= 767) {
              clicked.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

        }

  // Reader section nav
  document.querySelectorAll('[data-reader-sec]').forEach(el => {
    el.addEventListener('click', function() {
      jumpToReaderSection(this.dataset.readerSec);
    });
  });

  // Reader back-to-top button (named to avoid duplicate listeners)
  if (document.getElementById('readerBackTop')) {
    if (window._readerScrollHandler) window.removeEventListener('scroll', window._readerScrollHandler);
    window._readerScrollHandler = () => {
      const btn = document.getElementById('readerBackTop');
      if (btn) btn.style.display = window.scrollY > 400 ? 'block' : 'none';
      // Debounced scroll position save
      if (window._readerScrollSaveTimeout) clearTimeout(window._readerScrollSaveTimeout);
      window._readerScrollSaveTimeout = setTimeout(() => {
        if (readerActiveSection && window.scrollY > 0) {
          localStorage.setItem('readerScrollPos_' + readerActiveSection, window.scrollY);
        }
      }, 500);
    };
    window.addEventListener('scroll', window._readerScrollHandler);
    window._readerScrollHandler();
  }

  bindReaderSearch();

  // Reader font size buttons

  // Reader answer toggle
  bindReaderAnswerToggle();

  // Reader: restore scroll position for active section
  if (screen === 'reader' && readerActiveSection) {
    const savedScroll = localStorage.getItem('readerScrollPos_' + readerActiveSection);
    if (savedScroll) {
      setTimeout(() => window.scrollTo({ top: parseInt(savedScroll), behavior: 'smooth' }), 200);
    }

    setTimeout(() => markReaderSectionViewed(readerActiveSection), 600);
    setTimeout(() => updateReaderStats(), 800);
  }

  // KP explanation toggle in review
  bindReviewHeader();

  // Auto-scroll active KP nav item into view on mobile
  if (screen === 'review' && window.innerWidth <= 767) {
    setTimeout(() => {
      const activeItem = document.querySelector('.kp-nav-item.active');
      if (activeItem) {
        activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }, 100);
  }

  // Home screen
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', function(e) {
      const action = this.dataset.action;
      if (action === 'start-random') {
        currentFilter = { topic: 'all', type: 'all' };
        currentQuestions = shuffle(QUESTIONS);
        currentIndex = 0;
        answered = false;
        screen = 'quiz';
        render();
      } else if (action === 'start') {
        currentQuestions = getFilteredQuestions();
        if (currentQuestions.length === 0) { alert('当前筛选条件下无题目！'); return; }
        currentQuestions = shuffle(currentQuestions);
        currentIndex = 0;
        answered = false;
        screen = 'quiz';
        render();
      } else if (action === 'show-mistakes') {
        screen = 'mistakes';
        render();
      } else if (action === 'back') {
        screen = 'home';
        render();
      } else if (action === 'redo-all-mistakes') {
        const ids = Object.keys(state.mistakes).map(Number);
        currentQuestions = ids.map(id => QUESTIONS.find(q => q.id === id)).filter(Boolean);
        currentQuestions = shuffle(currentQuestions);
        currentIndex = 0;
        answered = false;
        screen = 'quiz';
        render();
      } else if (action === 'clear-mistakes') {
        if (confirm('确定要清空所有错题吗？')) {
          state.mistakes = {};
          saveState(state);
          render();
        }

  // Type filter
  document.querySelectorAll('[data-filter-type]').forEach(el => {

  document.querySelectorAll('[data-action="prev"]').forEach(el => {

    });
  });

  document.querySelectorAll('[data-action="next"]').forEach(el => {
    el.addEventListener('click', () => {
      if (currentIndex < currentQuestions.length - 1) {
        currentIndex++;
        answered = false;
        render();
      } else {
        // Quiz complete
        const total = state.stats.total || 0;
        const correct = state.stats.correct || 0;
        alert(`本轮完成！\n总计: ${state.stats.total} 题\n正确: ${state.stats.correct} 题\n正确率: ${total>0 ? Math.round(correct/total*100) : 0}%`);
        screen = 'home';
        render();
      }
    });
  });

  // Choice options
  const multiSubmitBtn = document.getElementById('multiSubmit');
  let selectedMultiLabels = [];

  document.querySelectorAll('#optionsContainer .option').forEach(el => {
    el.addEventListener('click', function() {
      if (answered) return;
      const q = currentQuestions[currentIndex];
      const isMulti = this.dataset.multi === '1';
      const selectedLabel = this.dataset.label;

      if (isMulti) {
        // Multi-select: toggle selection
        this.classList.toggle('selected');
        if (this.classList.contains('selected')) {
          selectedMultiLabels.push(selectedLabel);
        } else {
          selectedMultiLabels = selectedMultiLabels.filter(l => l !== selectedLabel);
        }
        // Sort for comparison
        selectedMultiLabels.sort();
        // Enable/disable submit button
        if (multiSubmitBtn) {
          multiSubmitBtn.disabled = selectedMultiLabels.length === 0;
        }
        return; // Don't submit yet
      }

      // Single-select: submit immediately
      answered = true;
      const correct = (selectedLabel === q.answer);

      // Highlight
      const allOptions = document.querySelectorAll('#optionsContainer .option');
      allOptions.forEach(o => {
        if (o.dataset.label === q.answer) o.classList.add('correct');
        if (o.dataset.label === selectedLabel && !correct) o.classList.add('wrong');
        if (o.dataset.label === selectedLabel && correct) o.classList.add('correct');
      });

      // Record
      recordAnswer(q, correct);

      // Card glow
      const qCard = document.getElementById('questionCard');
      if (qCard) { qCard.classList.add(correct ? 'correct-glow' : 'wrong-glow'); }

      const fb = document.getElementById('feedbackArea');

        fb.innerHTML = `<div class="feedback correct animate-in">✅ 正确！</div>${getKPHint(q)}`;
      } else {
        fb.innerHTML = `<div class="feedback wrong animate-in">❌ 错误！正确答案是 <strong>${q.answer}</strong></div>${getKPHint(q)}`;
      }
    });
  });

  // Multi-select submit button
  if (multiSubmitBtn) {
    multiSubmitBtn.addEventListener('click', function() {
      if (answered) return;
      answered = true;
      const q = currentQuestions[currentIndex];
      const selectedStr = selectedMultiLabels.join('');
      const correctAnswer = q.answer.split('').sort().join('');
      const correct = (selectedStr === correctAnswer);

      // Highlight all options
      const allOptions = document.querySelectorAll('#optionsContainer .option');
      const correctLabels = q.answer.split('');
      allOptions.forEach(o => {
        o.style.pointerEvents = 'none';
        if (correctLabels.includes(o.dataset.label)) o.classList.add('correct');
        if (selectedMultiLabels.includes(o.dataset.label) && !correctLabels.includes(o.dataset.label)) o.classList.add('wrong');
      });

      // Disable submit
      multiSubmitBtn.disabled = true;
      multiSubmitBtn.textContent = '已提交';

      // Record
      recordAnswer(q, correct);

      // Card glow
      const qCard2 = document.getElementById('questionCard');
      if (qCard2) { qCard2.classList.add(correct ? 'correct-glow' : 'wrong-glow'); }

      // Feedback
      const fb2 = document.getElementById('feedbackArea');
      if (correct) {
        fb2.innerHTML = `<div class="feedback correct animate-in">✅ 正确！答案 <strong>${q.answer}</strong></div>${getKPHint(q)}`;
      } else {
        fb2.innerHTML = `<div class="feedback wrong animate-in">❌ 错误！你的选择 <strong>${selectedStr}</strong>，正确答案是 <strong>${q.answer}</strong></div>${getKPHint(q)}`;
      }

  // True/False
  document.querySelectorAll('#tfContainer .tf-btn').forEach(el => {
    el.addEventListener('click', function() {
      if (answered) return;
      answered = true;
      const q = currentQuestions[currentIndex];
      const selected = this.dataset.value;
      const correct = (selected === q.answer);

      const btns = document.querySelectorAll('#tfContainer .tf-btn');
      btns.forEach(b => {
        if (b.dataset.value === q.answer) b.classList.add('correct');
        if (b.dataset.value === selected && !correct) b.classList.add('wrong');
      });

      const qCard3 = document.getElementById('questionCard');
      if (qCard3) { qCard3.classList.add(correct ? 'correct-glow' : 'wrong-glow'); }

      const fb3 = document.getElementById('feedbackArea');
      if (correct) {
        fb3.innerHTML = `<div class="feedback correct animate-in">✅ 正确！</div>${getKPHint(q)}`;
      } else {
        fb3.innerHTML = `<div class="feedback wrong animate-in">❌ 错误！正确答案是 <strong>${q.answer === '√' ? '正确 (√)' : '错误 (×)'}</strong></div>${getKPHint(q)}`;
      }
    });
  });

  // Fill
  const fillSubmit = document.getElementById('fillSubmit');
  const fillShow = document.getElementById('fillShow');
  if (fillSubmit) {
    fillSubmit.addEventListener('click', () => checkFillAnswer());
  }
  if (fillShow) {
    fillShow.addEventListener('click', () => {

      const fb = document.getElementById('feedbackArea');

  // Enter key in fill input

    showBtn.addEventListener('click', function() {

  document.querySelectorAll('[data-self]').forEach(el => {
    el.addEventListener('click', function() {

      answered = true;

      const correct = (this.dataset.self === 'correct');

      if (correct) {

  document.querySelectorAll('[data-type="open-show"]').forEach(el => {

// ========== KEYBOARD SHORTCUTS ==========
function bindQuizKeyboard() {
  if (window._quizKeyBound) return;
  window._quizKeyBound = true;
  document.addEventListener('keydown', function(e) {
    if (screen !== 'quiz' && screen !== 'smartreview') return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const key = e.key;
    const q = (screen === 'quiz') ? currentQuestions[currentIndex] : smartReviewQuestions[smartReviewIndex];

    // ArrowRight / Space: next question
    if (key === 'ArrowRight' || key === ' ') {
      e.preventDefault();
      if (screen === 'quiz' && currentIndex < currentQuestions.length - 1) {
        currentIndex++; answered = false; render();
      } else if (screen === 'smartreview' && smartReviewIndex < smartReviewQuestions.length - 1) {
        smartReviewIndex++; answered = false; render();
      }
    }
    // ArrowLeft: previous question
    else if (key === 'ArrowLeft') {
      e.preventDefault();
      if (screen === 'quiz' && currentIndex > 0) {
        currentIndex--; answered = false; render();
      } else if (screen === 'smartreview' && smartReviewIndex > 0) {
        smartReviewIndex--; answered = false; render();
      }
    }
    // Number keys 1-4 for choice options
    else if (q && q.type === 'choice' && !answered && /^[1-4]$/.test(key) && !e.ctrlKey && !e.metaKey) {
      e.preventDefault();
      const idx = parseInt(key) - 1;
      const opt = document.querySelector(`#optionsContainer .option[data-index="${idx}"]`);
      if (opt) opt.click();
    }
  });
}

function checkFillAnswer() {
  if (answered) return;
  const q = currentQuestions[currentIndex];
  const input = document.getElementById('fillInput');
  const userAnswer = normalizeAnswer(input.value);
  const expected = normalizeAnswer(q.answer);

  // Fuzzy: check if user answer contains key parts of correct answer
  answered = true;
  const expectedParts = expected.split(/[,，、\s]+/).filter(Boolean);
  const userParts = userAnswer.split(/[,，、\s]+/).filter(Boolean);

  let correct = false;
  if (expectedParts.length > 0 && userParts.length > 0) {
    // Check if enough parts match
    let matched = 0;
    for (const up of userParts) {
      for (const ep of expectedParts) {
        if (up.includes(ep) || ep.includes(up)) { matched++; break; }
      }
    }
    correct = matched >= Math.ceil(expectedParts.length * 0.6);
  } else {
    correct = userAnswer === expected;
  }

  recordAnswer(q, correct);

  // Card glow
  const qCard4 = document.getElementById('questionCard');
  if (qCard4) { qCard4.classList.add(correct ? 'correct-glow' : 'wrong-glow'); }

  const fb = document.getElementById('feedbackArea');
  if (correct) {
    fb.innerHTML = `<div class="feedback correct animate-in">✅ 正确！</div><div class="answer-reveal animate-in">你的答案: ${input.value}<br>标准答案: ${q.answer}</div>${getKPHint(q)}`;
  } else {
    fb.innerHTML = `<div class="feedback wrong animate-in">❌ 不完全正确</div><div class="answer-reveal animate-in">你的答案: ${input.value}<br><strong>标准答案: ${q.answer}</strong></div>${getKPHint(q)}`;
  }
  input.disabled = true;
}

function recordAnswer(q, correct) {
  state.stats.total = (state.stats.total || 0) + 1;
  if (correct) {
    state.stats.correct = (state.stats.correct || 0) + 1;
    delete state.mistakes[q.id];
    sm2Grade(q.id, 4); // SM-2: correct = good recall
  } else {
    state.mistakes[q.id] = true;
    sm2Grade(q.id, 2); // SM-2: wrong = failed recall
  }
  recordActivity();
  state.history.push({ id: q.id, correct, time: new Date().toISOString() });
  // Limit history
  if (state.history.length > 500) state.history = state.history.slice(-500);
  saveState(state);
}

function checkFillAnswerMatch(userAnswer, expected) {
  if (!userAnswer || !expected) return false;
  const ua = normalizeAnswer(userAnswer);
  const ea = normalizeAnswer(expected);
  if (ua === ea) return true;
  const eparts = ea.split(/[,，、\s]+/).filter(Boolean);
  const uparts = ua.split(/[,，、\s]+/).filter(Boolean);
  if (eparts.length === 0) return false;
  let matched = 0;
  for (const up of uparts) {
    for (const ep of eparts) {
      if (up.includes(ep) || ep.includes(up)) { matched++; break; }
    }
  }
  return matched >= Math.ceil(eparts.length * 0.6);
}

// ========== EXAM MODE ==========
function generateExam(totalCount) {
  const typePools = {};
  QUESTIONS.forEach(q => {
    if (!typePools[q.type]) typePools[q.type] = [];
    typePools[q.type].push(q);
  });

  const types = Object.keys(typePools);
  const total = QUESTIONS.length;

  let allocation = {};
  let allocated = 0;
  for (const t of types) {
    allocation[t] = Math.floor(typePools[t].length / total * totalCount);
    allocated += allocation[t];
  }
  const rems = types.map(t => ({
    type: t,
    rem: (typePools[t].length / total * totalCount) - allocation[t]
  })).sort((a, b) => b.rem - a.rem);
  for (let i = 0; i < totalCount - allocated; i++) {
    allocation[rems[i].type]++;
  }

  let exam = [];
  for (const t of types) {
    if (allocation[t] <= 0) continue;
    const pool = shuffle(typePools[t]);
    exam.push(...pool.slice(0, allocation[t]));
  }

  return shuffle(exam);
}

function renderExamPaper() {
  if (examQuestions.length === 0) {
    examQuestions = generateExam(examTotalCount);
    examAnswers = {};
    examSubmitted = false;
  }

  const answeredCount = Object.keys(examAnswers).length;
  const totalCount = examQuestions.length;
  const progressPct = (answeredCount / totalCount * 100).toFixed(0);

  let scorecardHtml = '';
  if (examSubmitted) {
    let correctCount = 0, autoTotal = 0, autoCorrect = 0;
    examQuestions.forEach((q) => {
      const ua = examAnswers[q.id];
      if (q.type === 'choice') {
        autoTotal++;
        if (q.answer && q.answer.length > 1) {
          if ((ua||'').split('').sort().join('') === q.answer.split('').sort().join('')) { autoCorrect++; correctCount++; }
        } else if (ua === q.answer) { autoCorrect++; correctCount++; }
      } else if (q.type === 'truefalse') {
        autoTotal++;
        if (ua === q.answer) { autoCorrect++; correctCount++; }
      } else if (q.type === 'fill') {
        autoTotal++;
        if (checkFillAnswerMatch(ua, q.answer)) { autoCorrect++; correctCount++; }
      } else if (q.type === 'shortanswer' || q.type === 'calculation') {
        if (ua === 'correct') correctCount++;
      }
    });
    const pct = Math.round(correctCount / totalCount * 100);
    let cls = 'poor';
    if (pct >= 90) cls = 'great';
    else if (pct >= 75) cls = 'good';
    else if (pct >= 60) cls = 'fair';
    scorecardHtml = `
      <div class="exam-scorecard" id="examScorecard">
        <div class="big-num ${cls}" style="animation:scoreCountUp .6s ease both">${pct} 分</div>
        <div class="score-detail" style="animation:feedbackSlide .5s ease .3s both">${correctCount} / ${totalCount} 题正确</div>
        <div class="score-detail" style="font-size:12px;margin-top:4px">
          ${autoTotal > 0 ? `自动判分: ${autoCorrect}/${autoTotal}` : ''}
        </div>
        <button class="btn btn-outline btn-sm mt-12" data-action="back">← 返回首页</button>
        <button class="btn btn-primary btn-sm mt-12" style="margin-left:8px" data-action="retake-exam">🔄 重新出卷</button>
      </div>`;
  }

  let qcardsHtml = examQuestions.map((q, idx) => {
    let dq = q.question;
    const optM = dq.match(/\s+[A-D][、.．]/);
    if (optM && q.options && q.options.length > 0) {
      dq = dq.substring(0, optM.index).trim();
    }

    const userAnswer = examAnswers[q.id] || '';
    const isCorrect = examSubmitted ? checkExamAnswer(q, userAnswer) : null;

    let cls = examSubmitted ? (isCorrect ? 'submitted correct' : 'submitted wrong') : '';
    let resultHtml = '';
    if (examSubmitted) {
      resultHtml = isCorrect
        ? '<span class="eq-result" style="color:#0d904f">✓ 正确</span>'
        : `<span class="eq-result" style="color:#d93025">✗ 错误${q.answer ? ' (答案: '+q.answer+')' : ''}</span>`;
    }

    let answerHtml = '';
    if (q.type === 'choice') answerHtml = renderExamChoice(q, idx, userAnswer);
    else if (q.type === 'truefalse') answerHtml = renderExamTrueFalse(q, idx, userAnswer);
    else if (q.type === 'fill') answerHtml = renderExamFill(q, idx, userAnswer);
    else answerHtml = renderExamOpen(q, idx, userAnswer);

    return `
      <div class="exam-qcard ${cls}" id="eq-${q.id}">
        <div class="eq-head">
          <span class="eq-num">${idx+1}. ${getTypeName(q.type)}</span>
          <span class="eq-type-badge">${getTopicShort(q.topic)}</span>
          ${resultHtml}
        </div>
        <div class="eq-text">${dq}</div>
        ${answerHtml}
      </div>`;
  }).join('');

  return `
    <div class="exam-header">
      <h1>📋 模拟考试</h1>
      <p>共 ${totalCount} 题 · 按题库比例随机抽题</p>
    </div>
    ${scorecardHtml}
    <div class="exam-progress-sticky">
      <span>📝 已答: ${answeredCount}/${totalCount}</span>
      <div class="mini-bar"><div class="mini-bar-fill" style="width:${progressPct}%"></div></div>
      <span>${progressPct}%</span>
    </div>
    ${qcardsHtml}
    ${examSubmitted ? '' : `
    <div class="exam-sticky-bottom">
      <button class="btn btn-lg" style="background:#e65100;color:#fff" data-action="submit-exam">
        📋 交卷 (${answeredCount}/${totalCount} 已答)
      </button>
    </div>`}
    ${examSubmitted ? `
    <div style="text-align:center;padding:16px">
      <button class="btn btn-outline" data-action="back">← 返回首页</button>
      <button class="btn btn-primary" data-action="retake-exam" style="margin-left:8px">🔄 重新出卷</button>
    </div>` : ''}
  `;
}

function renderExamChoice(q, idx, userAnswer) {
  if (!q.options || q.options.length === 0) {
    return `<p style="color:var(--text-muted);font-size:13px">（选项解析失败）</p>`;
  }
  const isMulti = q.answer && q.answer.length > 1;
  const userPicks = userAnswer ? userAnswer.split('') : [];
  const correctLabels = q.answer ? q.answer.split('') : [];
  return `
    ${isMulti ? '<div style="font-size:12px;color:#e65100;margin-bottom:4px;font-weight:600;">🔲 多选题（点击选项选中/取消）</div>' : ''}
    <div class="eq-options">
      ${q.options.map((opt, i) => {
        const label = q.option_labels && q.option_labels[i] ? q.option_labels[i] : String.fromCharCode(65+i);
        let optCls = '';
        if (isMulti) {
          if (userPicks.includes(label)) optCls = 'picked';
          if (examSubmitted) {
            if (correctLabels.includes(label)) optCls += ' correct-ans';
            if (userPicks.includes(label) && !correctLabels.includes(label)) optCls += ' wrong-pick';
          }
        } else {
          if (userAnswer === label) optCls = 'picked';
          if (examSubmitted) {
            if (label === q.answer) optCls += ' correct-ans';
            if (userAnswer === label && label !== q.answer) optCls += ' wrong-pick';
          }
        }
        return `<div class="eq-opt ${optCls}" data-qid="${q.id}" data-type="choice" data-value="${label}" data-multi="${isMulti ? '1' : '0'}">
          <span class="eq-letter">${label}</span>
          <span>${opt}</span>
        </div>`;
      }).join('')}
    </div>`;
}

function renderExamTrueFalse(q, idx, userAnswer) {
  return `
    <div class="eq-tf">
      ${['√','×'].map(v => {
        let btnCls = '';
        if (userAnswer === v) btnCls = 'picked';
        if (examSubmitted) {
          if (v === q.answer) btnCls += ' correct-ans';
          if (userAnswer === v && v !== q.answer) btnCls += ' wrong-pick';
        }
        return `<div class="eq-btn ${btnCls}" data-qid="${q.id}" data-type="truefalse" data-value="${v}">
          ${v === '√' ? '✓ 正确' : '✗ 错误'}
        </div>`;
      }).join('')}
    </div>`;
}

function renderExamFill(q, idx, userAnswer) {
  return `
    <input type="text" class="eq-input" data-qid="${q.id}" data-type="fill" value="${escapeHtml(userAnswer)}" placeholder="输入答案（多个答案用逗号分隔）" ${examSubmitted ? 'disabled' : ''}>
    ${examSubmitted ? `<div class="eq-answer-show"><strong>标准答案：</strong>${q.answer || '无'}</div>` : ''}`;
}

function renderExamOpen(q, idx, userAnswer) {
  const isSelfChecked = userAnswer === 'correct' || userAnswer === 'wrong';
  return `
    ${q.explanation ? `
      <button class="btn btn-sm btn-outline" data-qid="${q.id}" data-type="open-show" ${examSubmitted ? 'disabled' : ''}>📖 显示答案</button>
      <div class="eq-answer-show" id="openAns-${q.id}"><strong>参考答案：</strong><br>${(q.explanation||'').replace(/\n/g,'<br>')}</div>
      ${examSubmitted ? '' : `
      <div class="eq-self-btns" id="selfBtns-${q.id}" style="display:none">
        <button class="btn btn-sm btn-success" data-qid="${q.id}" data-type="self" data-value="correct" ${isSelfChecked && userAnswer === 'correct' ? 'disabled' : ''}>✓ 答对了</button>
        <button class="btn btn-sm btn-danger" data-qid="${q.id}" data-type="self" data-value="wrong" ${isSelfChecked && userAnswer === 'wrong' ? 'disabled' : ''}>✗ 答错了</button>
        ${isSelfChecked ? `<span style="font-size:13px;margin-left:8px;color:${userAnswer==='correct'?'#0d904f':'#d93025'}">已标记: ${userAnswer==='correct'?'正确':'错误'}</span>` : ''}
      </div>`}
    ` : `<p style="color:var(--text-muted);font-size:13px">（暂无解析，请自行对照教材）</p>`}
    ${examSubmitted ? `<div class="eq-answer-show" style="display:${userAnswer ? 'block' : 'none'}"><strong>自评：</strong>${userAnswer==='correct' ? '✓ 正确' : userAnswer==='wrong' ? '✗ 错误' : '未作答'}</div>` : ''}`;
}

function checkExamAnswer(q, userAnswer) {
  if (!userAnswer) return false;
  if (q.type === 'choice') {
    if (q.answer && q.answer.length > 1) {
      return userAnswer.split('').sort().join('') === q.answer.split('').sort().join('');
    }
    return userAnswer === q.answer;
  } else if (q.type === 'truefalse') {
    return userAnswer === q.answer;
  } else if (q.type === 'fill') {
    return checkFillAnswerMatch(userAnswer, q.answer);
  } else {
    return userAnswer === 'correct';
  }
}

function submitExam() {
  examSubmitted = true;

  document.querySelectorAll('.eq-input[data-type="fill"]').forEach(inp => {
    const qid = parseInt(inp.dataset.qid);
    if (!examAnswers[qid] && inp.value.trim()) {
      examAnswers[qid] = inp.value.trim();
    }
  });

  examQuestions.forEach(q => {
    const ua = examAnswers[q.id];
    if (ua !== undefined && ua !== '') {
      const correct = checkExamAnswer(q, ua);
      recordAnswer(q, correct);
    }
  });

  render();
  setTimeout(() => {
    const sc = document.getElementById('examScorecard');
    if (sc) sc.scrollIntoView({ behavior: 'smooth' });
  }, 100);
}

function updateExamProgress() {
  const answeredCount = Object.keys(examAnswers).length;
  const totalCount = examQuestions.length;
  const pct = (answeredCount / totalCount * 100).toFixed(0);
  const sticky = document.querySelector('.exam-progress-sticky');
  if (sticky) {
    sticky.innerHTML = `
      <span>📝 已答: ${answeredCount}/${totalCount}</span>
      <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
      <span>${pct}%</span>`;
  }
  const submitBtn = document.querySelector('[data-action="submit-exam"]');
  if (submitBtn) {
    submitBtn.textContent = `📋 交卷 (${answeredCount}/${totalCount} 已答)`;
  }
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cleanQuestionText(q) {
  if (!q.options || q.options.length === 0) return q.question;
  const m = q.question.match(/\s+[A-D][、.．]/);
  return m ? q.question.substring(0, m.index).trim() : q.question;
}


// ========== KP HELPER ==========
function getKPHint(q) {
  let html = '';
  // Per-question explanation (shown first, directly below answer feedback)
  if (q.explanation && q.explanation.trim()) {
    html += `<div class="q-explanation">💡 ${q.explanation}</div>`;
  }
  // Knowledge point info (collapsible, for deeper study)
  const kpInfo = getKPInfo(q);
  if (kpInfo) {
    html += `
      <div class="kp-hint" onclick="this.querySelector('.kp-detail').classList.toggle('show')">
        <strong>📌 ${kpInfo.name}</strong> — 点击展开完整知识点
        <div class="kp-detail">${kpInfo.explanation}</div>
      </div>`;
  }
  return html;
}

function jumpToKP(kpName) {
  reviewActiveKP = kpName;
  // Re-render the review page
  const app = document.getElementById('app');
  app.innerHTML = renderReview();
  // Scroll to review main area on mobile
  const reviewMain = document.getElementById('reviewMain');

function bindReviewHeader() {
  const kpHeader = document.getElementById('kpHeader');
  if (kpHeader) {
    kpHeader.addEventListener('click', function() {
      const exp = document.getElementById('kpExplanation');
      if (exp) exp.classList.toggle('show');
    });
  }
}

// ========== THEME MANAGEMENT ==========
function getThemePref() {
  try { return localStorage.getItem(STORAGE_KEY + '_theme') || 'auto'; }
  catch(e) { return 'auto'; }
}

function applyTheme(theme) {
  const html = document.documentElement;
  if (theme === 'dark') {
    html.setAttribute('data-theme', 'dark');
  } else if (theme === 'light') {
    html.setAttribute('data-theme', 'light');
  } else {
    html.removeAttribute('data-theme');
  }
  updateThemeUI(theme);
}

function updateThemeUI(theme) {
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (!icon || !label) return;
  if (theme === 'dark') {
    icon.textContent = '🌙'; label.textContent = '深色';
  } else if (theme === 'light') {
    icon.textContent = '☀️'; label.textContent = '浅色';
  } else {
    icon.textContent = '🌓'; label.textContent = '自动';
  }
}

function cycleTheme() {
  const current = getThemePref();
  const next = current === 'auto' ? 'dark' : current === 'dark' ? 'light' : 'auto';
  localStorage.setItem(STORAGE_KEY + '_theme', next);
  applyTheme(next);
}

// Listen for system theme changes
function listenSystemTheme() {
  try {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
      if (getThemePref() === 'auto') {
        updateThemeUI('auto');
      }
    });
  } catch(e) {}
}

// Initialize theme
applyTheme(getThemePref());
listenSystemTheme();

// ========== INIT ==========
if (QUESTIONS.length === 0) {
  document.getElementById('app').innerHTML = `
    <div class="hero-card" style="background:linear-gradient(135deg,var(--danger),#b91c1c)"><h1>⚠ 题库加载失败</h1></div>
    <div class="card text-center">
      <p>请确保 <code>questions.js</code> 文件与本页面在同一目录下。</p>
      <p style="margin-top:8px">或运行 <code>python parse_all.py</code> 重新生成题库文件。</p>
    </div>
  `;
} else {
  render();
}
